<div class="auth-container">
  <div class="auth-card">
    <h2>Create Account</h2>
    @if (error) { <div class="error-box">{{ error }}</div> }

    <!-- ngModel form controls (4 total) -->
    <div class="form-group">
      <label>Username</label>
      <input type="text" [(ngModel)]="username" name="username" class="form-control" placeholder="Choose a username" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" name="email" class="form-control" placeholder="your@email.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" name="password" class="form-control" />
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" [(ngModel)]="password2" name="password2" class="form-control" />
    </div>

    <!-- (click) event 2 -->
    <button (click)="onRegister()" [disabled]="loading" class="btn-primary">
      {{ loading ? 'Creating account...' : 'Register' }}
    </button>
    <p class="switch-link">Already have an account? <a routerLink="/login">Login</a></p>
  </div>
</div>
