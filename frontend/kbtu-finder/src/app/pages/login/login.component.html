<div class="auth-container">
  <div class="auth-card">
    <h2>Welcome Back</h2>
    <p class="subtitle">Sign in to your KBTU account</p>

    @if (error) {
      <div class="error-box">{{ error }}</div>
    }

    <!-- 2 ngModel form controls -->
    <div class="form-group">
      <label>Username</label>
      <input type="text" [(ngModel)]="username" name="username" placeholder="Enter username" class="form-control" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" name="password" placeholder="Enter password" class="form-control" />
    </div>

    <!-- (click) event 1 -->
    <button (click)="onLogin()" [disabled]="loading" class="btn-primary">
      {{ loading ? 'Signing in...' : 'Sign In' }}
    </button>

    <p class="switch-link">Don't have an account? <a routerLink="/register">Register</a></p>
  </div>
</div>
